version: "3"

tasks:
  server:
    desc: Start the FastAPI server
    cmds:
      - uvicorn main:app --app-dir server/python-version --host 0.0.0.0 --port 8000 --reload
    dir: .

  app:
    desc: Start the SvelteKit app
    cmds:
      - bun run dev
    dir: app

  open:
    desc: Open the application in the browser
    cmds:
      - open http://localhost:5173

  setup:
    desc: Install all dependencies for server and app
    cmds:
      - pip install -r server/requirements.txt
      - cd app && bun install

  default:
    desc: Start both server and app services
    deps: [server, app]
    cmds:
      - task: open
